version: '3.9'

services:
  onequeue:
    build: .
    container_name: onequeue
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - NVIDIA_API_KEYS=${NVIDIA_API_KEYS}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_GPU_URL=${OLLAMA_GPU_URL}
      - POLLING_INTERVAL_SECONDS=1
      - DATABASE_URL=sqlite:////app/onequeue.db
    volumes:
      - onequeue-data:/app/data
    depends_on:
      - ollama
    networks:
      - onequeue-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - onequeue-network

volumes:
  onequeue-data:
  ollama-data:

networks:
  onequeue-network:
    driver: bridge
