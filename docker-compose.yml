version: '3.9'

services:
  # OneQueue Backend API
  onequeue:
    image: python:3.13-slim
    container_name: onequeue
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
      - POLLING_INTERVAL_SECONDS=1
      - DATABASE_URL=sqlite:////app/onequeue.db
    volumes:
      - ./app:/app
      - onequeue-data:/app/data
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt &&
               python -m uvicorn app.main:app --host 0.0.0.0 --port 8081"
    depends_on:
      - ollama
    networks:
      - onequeue-network

  # Ollama Local Inference
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - onequeue-network

  # Frontend Development Server (optional)
  frontend:
    image: node:20-alpine
    container_name: onequeue-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: npm run dev -- --host
    profiles:
      - dev
    networks:
      - onequeue-network

volumes:
  onequeue-data:
  ollama-data:

networks:
  onequeue-network:
    driver: bridge

